project:
  name: scottysgreenlab
  mode: auto

niche:
  topic: "regenerative agriculture, composting, fermentation, soil science"
  domains:
    - scottysgardeninglab.com
  seed_keywords:
    - "how to compost"
    - "living soil"
    - "lacto-fermentation"
    - "regenerative gardening"
    - "soil biology"
    - "bokashi composting"
  target_audiences:
    - "home gardeners in Houston/Texas"
    - "hobby farmers"
    - "fermentation enthusiasts"
    - "permaculture practitioners"
  entities:
    - Living Soil Salad Mix
    - Fermented Kimchi
    - Escabeche
    - Spicy Radishes
  locale: en-US
  geo_targets:
    - "Spring Branch TX"
    - "Houston TX"

runtime:
  timezone: America/Chicago
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 3

knowledge_base:
  backend: markdown
  root: artifacts/clawrank/kb

llm:
  provider: cli
  default_backend: gemini
  heavy_backend: gemini
  base_url: ""
  api_key_env: ""
  primary_model: ""
  acpx_backend: gemini
  acpx_session_prefix: clawrank-scotty

brain:
  connection_env: BRAIN_DB_URL
  database_id: wiixc9eeb7

gpu_models:
  intent_classifier: "http://100.66.51.21:8002/intent"
  query_fanout: "http://100.66.51.21:8789/fanout"
  sentiment: "http://100.66.51.21:8002/sentiment"
  reranker: "http://100.66.51.21:8788/rerank"
  embedder: "local://e5-base-v2"

security:
  hitl_required_stages: []
  allow_publish_without_approval: false

keywords:
  max_keywords_per_seed: 100
  paa_depth: 2
  serp_similarity_threshold: 0.6
  min_search_volume: 10

content:
  enabled_types:
    - how_to
    - pillar
    - comparison
    - gap_fill
    - deep_dive
    - listicle
    - seasonal
    - contrarian
  pillar_word_count: 3000
  how_to_word_count: 2000
  comparison_word_count: 2000
  deep_dive_word_count: 2500
  listicle_word_count: 1500
  seasonal_word_count: 1500
  contrarian_word_count: 2000
  gap_fill_word_count: 1500
  min_eeat_score: 0.7
  min_originality_score: 0.6
  max_ai_slop_score: 0.3
  citation_density_target: 3
  batch_size: 10

publish:
  target_framework: astro
  output_format: json
  output_dir: "data/content-pipeline/"
  site_url: "https://scottysgardeninglab.com"
  mdx_enabled: false
  auto_deploy: false

monitor:
  enable_rank_tracking: false
  content_decay_threshold_days: 90

content_agent:
  writer_temperature: 0.7
  fact_check_enabled: true
  contrarian_enabled: true
  quality_scorer_enabled: true
  review_max_rounds: 2
